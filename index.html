/* ───────── tiny helpers ───────── */
const readFileAsDataURL = (file) =>
  new Promise((res) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });

/* ───────── IMAGE UPLOAD BOX (with Drag & Drop) ───────── */
function ImageUpload({ imageData, onUpload, label }) {
  const ref = useRef();
  const [isDragging, setIsDragging] = useState(false);

  const handle = async (e) => {
    const f = e.target.files?.[0];
    if (f) onUpload(await readFileAsDataURL(f));
  };
  
  const handleDragOver = (e) => {
    e.preventDefault();
    setIsDragging(true);
  };
  
  const handleDragLeave = () => {
    setIsDragging(false);
  };
  
  const handleDrop = async (e) => {
    e.preventDefault();
    setIsDragging(false);
    const f = e.dataTransfer.files?.[0];
    if (f && f.type.startsWith('image/')) onUpload(await readFileAsDataURL(f));
  };

  return (
    <div
      onClick={() => ref.current.click()}
      onDragOver={handleDragOver}
      onDragLeave={handleDragLeave}
      onDrop={handleDrop}
      style={{
        width: "100%",
        height: 120,
        borderRadius: 8,
        border: `2px dashed ${imageData ? GOLD : (isDragging ? GOLD_DARK : "#ccc")}`,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        cursor: "pointer",
        overflow: "hidden",
        background: imageData ? "none" : (isDragging ? "#fefdfa" : "#faf8f4"),
        position: "relative",
        transition: "all 0.2s ease"
      }}
    >
      {imageData ? (
        <img
          src={imageData}
          alt=""
          style={{ width: "100%", height: "100%", objectFit: "cover" }}
        />
      ) : (
        <span style={{ color: "#999", fontSize: 13, textAlign: "center", padding: 8 }}>
          {isDragging ? "📷 Drop image here" : (label || "📷 Click or drag image to upload")}
        </span>
      )}
      <input
        ref={ref}
        type="file"
        accept="image/*"
        onChange={handle}
        style={{ display: "none" }}
      />
    </div>
  );
}

function Field({ label, value, onChange, multiline, small }) {

    transition: "border-color 0.2s",

  };
  return (
    <div style={{ marginBottom: 10 }}>
      <label
        style={{
          display: "block",
          fontSize: 11,
          fontWeight: 700,
          textTransform: "uppercase",
          letterSpacing: 1.5,
          color: "#888",
          marginBottom: 4,
        }}
      >

      {multiline ? (
        <textarea
          rows={3}
          value={value}
          onChange={(e) => onChange(e.target.value)}

          onFocus={(e) => (e.target.style.borderColor = GOLD)}
          onBlur={(e) => (e.target.style.borderColor = "#ddd")}

      ) : (
        <input
          value={value}
          onChange={(e) => onChange(e.target.value)}
          style={shared}
          onFocus={(e) => (e.target.style.borderColor = GOLD)}
          onBlur={(e) => (e.target.style.borderColor = "#ddd")}
        />
      )}
    </div>
  );
}

/* ───────── GENERATE EMAIL HTML ───────── */
function generateEmailHTML({ logoData, dateRange, rows, footer }) {
  const EMAIL_W = 600;
  const IMG_W = 250;
  const TEXT_W = 350;

  const rowsHTML = rows
    .map((row, i) => {
      const reversed = i % 2 !== 0;

      const imgCell = row.imageData
        ? `<td width="${IMG_W}" style="width:${IMG_W}px;padding:0;vertical-align:top;"><img src="${row.imageData}" alt="" width="${IMG_W}" height="260" style="display:block;width:${IMG_W}px;height:260px;object-fit:cover;" /></td>`
        : `<td width="${IMG_W}" style="width:${IMG_W}px;padding:0;vertical-align:top;background-color:#f5f0e6;height:260px;"></td>`;

      const borderSide = reversed ? "border-right" : "border-left";
      const textCell = `<td width="${TEXT_W}" style="width:${TEXT_W}px;padding:24px;vertical-align:middle;${borderSide}:4px solid ${GOLD};">
        <div style="font-weight:900;font-size:24px;text-transform:uppercase;letter-spacing:4px;color:${GOLD_DARK};margin-bottom:4px;font-family:Georgia,serif;border-bottom:3px solid #D4A84344;padding-bottom:4px;">${row.day}</div>
        <div style="font-weight:700;font-size:12px;color:${GOLD_DARK};margin-bottom:8px;">${row.time}</div>
        <div style="font-weight:900;font-size:18px;line-height:1.25;color:${BLACK};margin-bottom:8px;font-family:Georgia,serif;">${row.title}</div>
        <div style="font-weight:700;font-size:12px;color:#1a1a1a;margin-bottom:6px;">${row.host}</div>
        <div style="font-size:13px;line-height:1.6;color:#3d3d3d;margin-bottom:10px;">${row.description}</div>
        ${row.linkText ? `<a href="${row.linkUrl || "#"}" style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:${GOLD_DARK};text-decoration:none;">${row.linkText} &rarr;</a>` : ""}
      </td>`;
      const cells = reversed ? textCell + imgCell : imgCell + textCell;
      return `<tr><td style="padding:0;"><table width="${EMAIL_W}" cellpadding="0" cellspacing="0" style="border-bottom:1px solid #edebe6;"><tr>${cells}</tr></table></td></tr>`;
    })
    .join("\n");

  return `<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background-color:#faf8f4;font-family:Helvetica,Arial,sans-serif;">
<table width="${EMAIL_W}" cellpadding="0" cellspacing="0" align="center" style="background-color:#ffffff;">
  <tr><td style="padding:16px 24px;border-bottom:3px solid ${GOLD};background-color:#ffffff;">
    <table width="100%" cellpadding="0" cellspacing="0"><tr>
      <td style="vertical-align:middle;">${logoData ? `<img src="${logoData}" alt="Myers Home Buyers" height="46" style="height:46px;width:auto;display:block;" />` : `<span style="font-family:Georgia,serif;font-weight:900;font-size:20px;color:${BLACK};">Myers <span style="color:${GOLD};">Home Buyers</span></span>`}</td>
      <td style="text-align:right;vertical-align:middle;"><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#7a7a7a;">Weekly Newsletter</span></td>
    </tr></table>
  </td></tr>
  <tr><td style="background-color:${GOLD};text-align:center;padding:12px 24px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:3px;color:${BLACK};">${dateRange}</td></tr>
  ${rowsHTML}
  <tr><td style="background-color:${BLACK};padding:20px 24px;border-top:3px solid ${GOLD};">
    <table width="100%" cellpadding="0" cellspacing="0"><tr>
      <td style="color:#cccccc;font-size:12px;">Phone: ${footer.phone}</td>
      <td style="color:#cccccc;font-size:12px;text-align:center;">${footer.website}</td>
      <td style="color:#cccccc;font-size:12px;text-align:right;">${footer.email}</td>
    </tr></table>
  </td></tr>
</table>
</body></html>`;
}

function NewsletterBuilder() {
  const [tab, setTab] = useState("edit");
  const [logoData, setLogoData] = useState(null);
  const [dateRange, setDateRange] = useState("Week of April 27 \u2013 May 1, 2026");
  const [rows, setRows] = useState(defaultRows);
  const [footer, setFooter] = useState(defaultFooter);
  const [copied, setCopied] = useState(false);
  const [copiedCode, setCopiedCode] = useState(false);
  const [draggedId, setDraggedId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const previewRef = useRef();
  let nextId = useRef(10);

  const updateRow = (id, updated) =>
    setRows((r) => r.map((row) => (row.id === id ? updated : row)));
  const removeRow = (id) => setRows((r) => r.filter((row) => row.id !== id));
  const duplicateRow = (id) => {
    setRows((r) => {
      const idx = r.findIndex((row) => row.id === id);
      if (idx === -1) return r;
      const clone = { ...r[idx], id: nextId.current++, imageData: r[idx].imageData };
      const newRows = [...r];
      newRows.splice(idx + 1, 0, clone);
      return newRows;
    });
  };
  const addRow = () => {
    setRows((r) => [
      ...r,
      {
        id: nextId.current++,
        day: "Day",
        time: "Time",
        title: "Event Title",
        host: "Host",
        description: "Event description goes here.",
        linkText: "Learn More",
        linkUrl: "#",
        imageData: null,
      },
    ]);
  };

  /* ── Drag-and-drop handlers ── */
  const handleDragStart = (id) => (e) => {
    setDraggedId(id);
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", id);
    e.currentTarget.style.opacity = "0.4";
  };
  const handleDragOver = (id) => (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    setDragOverId(id);
  };
  const handleDrop = (targetId) => (e) => {
    e.preventDefault();
    if (draggedId == null || draggedId === targetId) {
      setDraggedId(null);
      setDragOverId(null);
      return;
    }
    setRows((prev) => {
      const arr = [...prev];
      const fromIdx = arr.findIndex((r) => r.id === draggedId);
      const toIdx = arr.findIndex((r) => r.id === targetId);
      const [moved] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, moved);
      return arr;
    });
    setDraggedId(null);
    setDragOverId(null);
  };
  const handleDragEnd = (e) => {
    e.currentTarget.style.opacity = "1";
    setDraggedId(null);
    setDragOverId(null);
  };

  const handleCopyRendered = useCallback(async () => {
    try {
      const html = generateEmailHTML({ logoData, dateRange, rows, footer });
      await navigator.clipboard.write([
        new ClipboardItem({ "text/html": new Blob([html], { type: "text/html" }) }),
      ]);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = generateEmailHTML({ logoData, dateRange, rows, footer });
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopiedCode(true);
      setTimeout(() => setCopiedCode(false), 2500);
    }
  }, [logoData, dateRange, rows, footer]);

  const handleCopyCode = useCallback(() => {
    const html = generateEmailHTML({ logoData, dateRange, rows, footer });
    const ta = document.createElement("textarea");
    ta.value = html;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    setCopiedCode(true);
    setTimeout(() => setCopiedCode(false), 2500);
  }, [logoData, dateRange, rows, footer]);

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "#f5f3ee",
        fontFamily: "'DM Sans', sans-serif",
      }}
    >
      <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet"
      />

      {/* ── TOP BAR ── */}
      <div
        style={{
          background: "#ffffff",
          padding: "16px 24px",
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          borderBottom: `3px solid ${GOLD}`,
          position: "sticky",
          top: 0,
          zIndex: 100,
        }}
      >
        <div style={{ display: "flex", alignItems: "center" }}>
          <img
            src="myers-logo.png"
            alt="Myers Home Buyers"
            style={{ height: 36, width: "auto" }}
          />
          <span
            style={{
              fontFamily: "'DM Sans', sans-serif",
              fontWeight: 700,
              fontSize: 16,
              color: "#aaa",
              marginLeft: 12,
              paddingLeft: 12,
              borderLeft: "2px solid #eee",
            }}
          >
            Newsletter Builder
          </span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={handleCopyRendered}
            style={{
              background: `linear-gradient(135deg, ${GOLD_DARK}, ${GOLD})`,
              color: BLACK,
              border: "none",
              padding: "8px 20px",
              borderRadius: 6,
              fontWeight: 700,
              fontSize: 13,
              cursor: "pointer",
              letterSpacing: 0.5,
            }}
          >
            {copied ? "✓ Copied!" : "📋 Copy for Email"}
          </button>
          <button
            onClick={handleCopyCode}
            style={{
              background: "transparent",
              color: "#aaa",
              border: `1px solid #444`,
              padding: "8px 16px",
              borderRadius: 6,
              fontWeight: 600,
              fontSize: 12,
              cursor: "pointer",
            }}
          >
            {copiedCode ? "✓ Copied!" : "{ } HTML Code"}
          </button>
        </div>
      </div>

      {/* ── TABS ── */}
      <div
        style={{
          display: "flex",
          justifyContent: "center",
          gap: 0,
          padding: "16px 24px 0",
        }}
      >
        {["edit", "preview"].map((t) => (
          <button
            key={t}
            onClick={() => setTab(t)}
            style={{
              padding: "10px 32px",
              border: "none",
              borderBottom: tab === t ? `3px solid ${GOLD}` : "3px solid transparent",
              background: tab === t ? "#fff" : "transparent",
              fontWeight: 700,
              fontSize: 13,
              textTransform: "uppercase",
              letterSpacing: 2,
              color: tab === t ? BLACK : "#999",
              cursor: "pointer",
              transition: "all 0.2s",
              borderRadius: "8px 8px 0 0",
            }}
          >
            {t === "edit" ? "✏️ Editor" : "👁 Preview"}
          </button>
        ))}
      </div>

      {/* ── CONTENT ── */}
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "20px 16px 60px" }}>
        {tab === "edit" ? (
          <>
            {/* Header settings */}
            <div
              style={{
                background: "#fff",
                border: "1px solid #e8e5df",
                borderRadius: 10,
                padding: 20,
                marginBottom: 16,
              }}
            >
              <span
                style={{
                  fontSize: 12,
                  fontWeight: 800,
                  textTransform: "uppercase",
                  letterSpacing: 2,
                  color: GOLD_DARK,
                  display: "block",
                  marginBottom: 14,
                }}
              >
                Header
              </span>
              <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
                <div style={{ width: 160, flexShrink: 0 }}>
                  <ImageUpload
                    imageData={logoData}
                    onUpload={setLogoData}
                    label="📷 Upload logo"
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <Field
                    label="Date Range"
                    value={dateRange}
                    onChange={setDateRange}
                  />
                </div>
              </div>
            </div>

            {/* Event rows */}
            {rows.map((row, i) => (
              <RowEditor
                key={row.id}
                row={row}
                index={i}
                total={rows.length}
                onChange={(updated) => updateRow(row.id, updated)}
                onRemove={() => removeRow(row.id)}
                onDuplicate={() => duplicateRow(row.id)}
                isDragOver={dragOverId === row.id}
                onDragStart={handleDragStart(row.id)}
                onDragOver={handleDragOver(row.id)}
                onDragEnd={handleDragEnd}
                onDrop={handleDrop(row.id)}
              />
            ))}

            <button
              onClick={addRow}
              style={{
                width: "100%",
                padding: "14px",
                border: `2px dashed #ccc`,
                borderRadius: 10,
                background: "none",
                fontWeight: 700,
                fontSize: 14,
                color: "#999",
                cursor: "pointer",
                marginBottom: 16,
              }}
            >
              + Add Event Row
            </button>

            {/* Footer settings */}
            <div
              style={{
                background: "#fff",
                border: "1px solid #e8e5df",
                borderRadius: 10,
                padding: 20,
              }}
            >
              <span
                style={{
                  fontSize: 12,
                  fontWeight: 800,
                  textTransform: "uppercase",
                  letterSpacing: 2,
                  color: GOLD_DARK,
                  display: "block",
                  marginBottom: 14,
                }}
              >
                Footer
              </span>
              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 1 }}>
                  <Field
                    label="Phone"
                    value={footer.phone}
                    onChange={(v) => setFooter({ ...footer, phone: v })}
                    small
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <Field
                    label="Website"
                    value={footer.website}
                    onChange={(v) => setFooter({ ...footer, website: v })}
                    small
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <Field
                    label="Email"
                    value={footer.email}
                    onChange={(v) => setFooter({ ...footer, email: v })}
                    small
                  />
                </div>
              </div>
            </div>
          </>
        ) : (
          /* ── PREVIEW TAB ── */
          <div
            ref={previewRef}
            style={{
              maxWidth: 600,
              margin: "0 auto",
              background: "#fff",
              boxShadow: "0 4px 40px rgba(0,0,0,0.06)",
              borderRadius: 4,
              overflow: "hidden",
            }}
          >
            {/* Header */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "16px 24px",
                borderBottom: `3px solid ${GOLD}`,
              }}
            >
              <div>
                {logoData ? (
                  <img
                    src={logoData}
                    alt="Logo"
                    style={{ height: 46, width: "auto" }}
                  />
                ) : (
                  <span
                    style={{
                      fontFamily: "'Playfair Display', serif",
                      fontWeight: 900,
                      fontSize: 20,
                      color: BLACK,
                    }}
                  >
                    Myers{" "}
                    <span style={{ color: GOLD }}>Home Buyers</span>
                  </span>
                )}
              </div>
              <span
                style={{
                  fontSize: 11,
                  fontWeight: 700,
                  textTransform: "uppercase",
                  letterSpacing: 2,
                  color: "#7a7a7a",
                }}
              >
                Weekly Newsletter
              </span>
            </div>

            {/* Date banner */}
            <div
              style={{
                background: GOLD,
                textAlign: "center",
                padding: "12px 24px",
                fontWeight: 700,
                fontSize: 12,
                textTransform: "uppercase",
                letterSpacing: 3,
                color: BLACK,
              }}
            >
              {dateRange}
            </div>

            {/* Event rows */}
            {rows.map((row, i) => (
              <PreviewRow key={row.id} row={row} index={i} />
            ))}

            {/* Footer */}
            <div
              style={{
                background: BLACK,
                padding: "20px 24px",
                display: "flex",
                justifyContent: "space-between",
                borderTop: `3px solid ${GOLD}`,
              }}
            >
              <span style={{ color: "#ccc", fontSize: 12 }}>📞 {footer.phone}</span>
              <span style={{ color: "#ccc", fontSize: 12 }}>🌐 {footer.website}</span>
              <span style={{ color: "#ccc", fontSize: 12 }}>✉️ {footer.email}</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NewsletterBuilder />);
  </script>
</body>
</html>
