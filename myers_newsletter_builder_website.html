/* ───────── tiny helpers ───────── */
const readFileAsDataURL = (file) =>
  new Promise((res) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });

/* ───────── IMAGE UPLOAD BOX ───────── */
function ImageUpload({ imageData, onUpload, label }) {
  const ref = useRef();
  const [isDragging, setIsDragging] = useState(false);

  const handle = async (e) => {
    const f = e.target.files?.[0];
    if (f) onUpload(await readFileAsDataURL(f));
  };
  
  const handleDragOver = (e) => {
    e.preventDefault();
    setIsDragging(true);
  };
  
  const handleDragLeave = () => {
    setIsDragging(false);
  };
  
  const handleDrop = async (e) => {
    e.preventDefault();
    setIsDragging(false);
    const f = e.dataTransfer.files?.[0];
    if (f && f.type.startsWith('image/')) onUpload(await readFileAsDataURL(f));
  };

  return (
    <div
      onClick={() => ref.current.click()}
      onDragOver={handleDragOver}
      onDragLeave={handleDragLeave}
      onDrop={handleDrop}
      style={{
        width: "100%",
        height: 120,
        borderRadius: 8,
        border: `2px dashed ${imageData ? GOLD : (isDragging ? GOLD_DARK : "#ccc")}`,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        cursor: "pointer",
        overflow: "hidden",
        background: imageData ? "none" : (isDragging ? "#fefdfa" : "#faf8f4"),
        position: "relative",
        transition: "all 0.2s ease"
      }}
    >
      {imageData ? (
        <img
          src={imageData}
          alt=""
          style={{ width: "100%", height: "100%", objectFit: "cover" }}
        />
      ) : (
        <span style={{ color: "#999", fontSize: 13, textAlign: "center", padding: 8 }}>
          {isDragging ? "Drop image here" : (label || "Click or drag image to upload")}
        </span>
      )}
      <input
        ref={ref}
        type="file"
        accept="image/*"
        onChange={handle}
        style={{ display: "none" }}
      />
    </div>
  );
}

/* ───────── TEXT INPUT ───────── */
function Field({ label, value, onChange, multiline, small }) {
  const shared = {
    width: "100%",
    padding: small ? "6px 10px" : "8px 12px",
    border: "1px solid #ddd",
    borderRadius: 6,
    fontSize: small ? 13 : 14,
    fontFamily: "'DM Sans', sans-serif",
    outline: "none",
    transition: "border-color 0.2s",
    background: "#fff",
  };
  return (
    <div style={{ marginBottom: 10 }}>
      <label
        style={{
          display: "block",
          fontSize: 11,
          fontWeight: 700,
          textTransform: "uppercase",
          letterSpacing: 1.5,
          color: "#888",
          marginBottom: 4,
        }}
      >
        {label}
      </label>
      {multiline ? (
        <textarea
          rows={3}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          style={{ ...shared, resize: "vertical" }}
          onFocus={(e) => (e.target.style.borderColor = GOLD)}
          onBlur={(e) => (e.target.style.borderColor = "#ddd")}
        />
      ) : (
        <input
          value={value}
          onChange={(e) => onChange(e.target.value)}
          style={shared}
          onFocus={(e) => (e.target.style.borderColor = GOLD)}
          onBlur={(e) => (e.target.style.borderColor = "#ddd")}
        />
      )}
    </div>
  );
}

/* ───────── GENERATE EMAIL HTML ───────── */
function generateEmailHTML({ logoData, dateRange, rows, footer }) {

          : `<div style="background:linear-gradient(135deg,${GOLD}33,${GOLD}11);height:240px;"></div>`
      }</td>`;
      const borderSide = reversed ? "border-right" : "border-left";
      const textCell = `<td style="width:58%;padding:30px 34px;vertical-align:middle;${borderSide}:4px solid ${GOLD};">
        <div style="font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:4px;color:${GOLD_DARK};margin-bottom:2px;font-family:Georgia,serif;">${row.day}</div>
        <div style="font-weight:700;font-size:13px;color:${GOLD_DARK};margin-bottom:10px;">${row.time}</div>
        <div style="font-weight:900;font-size:22px;line-height:1.2;color:${BLACK};margin-bottom:10px;font-family:Georgia,serif;">${row.title}</div>
        <div style="font-weight:700;font-size:13px;color:#1a1a1a;margin-bottom:8px;">${row.host}</div>
        <div style="font-size:14px;line-height:1.7;color:#3d3d3d;margin-bottom:14px;">${row.description}</div>
        ${row.linkText ? `<a href="${row.linkUrl || "#"}" style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:2px;color:${GOLD_DARK};text-decoration:none;">${row.linkText} →</a>` : ""}
      </td>`;
      const cells = reversed ? textCell + imgCell : imgCell + textCell;
      return `<tr><td style="padding:0;"><table width="100%" cellpadding="0" cellspacing="0" style="border-bottom:1px solid #edebe6;"><tr>${cells}</tr></table></td></tr>`;
    })
    .join("\n");

  return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;background:#faf8f4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

            style="{
              fontFamily: "'DM Sans', sans-serif",
              fontWeight: 700,
              fontSize: 16,
              color: "#aaa",
              marginLeft: "12px",
              paddingLeft: "12px",
              borderLeft: "2px solid #eee",
            }"
          >
            Newsletter Builder
          </span>
</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={handleCopyRendered}
            style={{
              background: `linear-gradient(135deg, ${GOLD_DARK}, ${GOLD})`,
              color: BLACK,
              border: "none",
              padding: "8px 20px",
              borderRadius: 6,
              fontWeight: 700,
              fontSize: 13,
              cursor: "pointer",
              letterSpacing: 0.5,
            }}
          >
            {copied ? "✓ Copied!" : "📋 Copy for Email"}
          </button>
          <button
            onClick={handleCopyCode}
            style={{
              background: "transparent",
              color: "#aaa",
              border: `1px solid #444`,
              padding: "8px 16px",
              borderRadius: 6,
              fontWeight: 600,
              fontSize: 12,
              cursor: "pointer",
            }}
          >
            {copiedCode ? "✓ Copied!" : "{ } HTML Code"}
          </button>
        </div>
      </div>

      {/* ── TABS ── */}
      <div
        style={{
          display: "flex",
          justifyContent: "center",
          gap: 0,
          padding: "16px 24px 0",
        }}
      >
        {["edit", "preview"].map((t) => (
          <button
            key={t}
            onClick={() => setTab(t)}
            style={{
              padding: "10px 32px",
              border: "none",
              borderBottom: tab === t ? `3px solid ${GOLD}` : "3px solid transparent",
              background: tab === t ? "#fff" : "transparent",
              fontWeight: 700,
              fontSize: 13,
              textTransform: "uppercase",
              letterSpacing: 2,
              color: tab === t ? BLACK : "#999",
              cursor: "pointer",
              transition: "all 0.2s",
              borderRadius: "8px 8px 0 0",
            }}
          >
            {t === "edit" ? "✏️ Editor" : "👁 Preview"}
          </button>
        ))}
      </div>

      {/* ── CONTENT ── */}
      <div style={{ maxWidth: 760, margin: "0 auto", padding: "20px 16px 60px" }}>
        {tab === "edit" ? (
          <>
            {/* Header settings */}
            <div
              style={{
                background: "#fff",
                border: "1px solid #e8e5df",
                borderRadius: 10,
                padding: 20,
                marginBottom: 16,
              }}
            >
              <span
                style={{
                  fontSize: 12,
                  fontWeight: 800,
                  textTransform: "uppercase",
                  letterSpacing: 2,
                  color: GOLD_DARK,
                  display: "block",
                  marginBottom: 14,
                }}
              >
                Header
              </span>
              <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
                <div style={{ width: 160, flexShrink: 0 }}>
                  <ImageUpload
                    imageData={logoData}
                    onUpload={setLogoData}
                    label="Upload logo"
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <Field
                    label="Date Range"
                    value={dateRange}
                    onChange={setDateRange}
                  />
                </div>
              </div>
            </div>

            {/* Event rows */}
            {rows.map((row, i) => (
              <RowEditor
                key={row.id}
                row={row}
                index={i}
                total={rows.length}
                onChange={(updated) => updateRow(row.id, updated)}
                onRemove={() => removeRow(row.id)}
              />
            ))}

            <button
              onClick={addRow}
              style={{
                width: "100%",
                padding: "14px",
                border: `2px dashed #ccc`,
                borderRadius: 10,
                background: "none",
                fontWeight: 700,
                fontSize: 14,
                color: "#999",
                cursor: "pointer",
                marginBottom: 16,
              }}
            >
              + Add Event Row
            </button>

            {/* Footer settings */}
            <div
              style={{
                background: "#fff",
                border: "1px solid #e8e5df",
                borderRadius: 10,
                padding: 20,
              }}
            >
              <span
                style={{
                  fontSize: 12,
                  fontWeight: 800,
                  textTransform: "uppercase",
                  letterSpacing: 2,
                  color: GOLD_DARK,
                  display: "block",
                  marginBottom: 14,
                }}
              >
                Footer
              </span>
              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 1 }}>
                  <Field
                    label="Phone"
                    value={footer.phone}
                    onChange={(v) => setFooter({ ...footer, phone: v })}
                    small
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <Field
                    label="Website"
                    value={footer.website}
                    onChange={(v) => setFooter({ ...footer, website: v })}
                    small
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <Field
                    label="Email"
                    value={footer.email}
                    onChange={(v) => setFooter({ ...footer, email: v })}
                    small
                  />
                </div>
              </div>
            </div>
          </>
        ) : (
          /* ── PREVIEW TAB ── */
          <div
            ref={previewRef}
            style={{
              background: "#fff",
              boxShadow: "0 4px 40px rgba(0,0,0,0.06)",
              borderRadius: 4,
              overflow: "hidden",
            }}
          >
            {/* Header */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "20px 40px",
                borderBottom: `3px solid ${GOLD}`,
              }}
            >
              <div>
                {logoData ? (
                  <img
                    src={logoData}
                    alt="Logo"
                    style={{ height: 52, width: "auto" }}
                  />
                ) : (
                  <span
                    style={{
                      fontFamily: "'Playfair Display', serif",
                      fontWeight: 900,
                      fontSize: 22,
                      color: BLACK,
                    }}
                  >
                    Myers{" "}
                    <span style={{ color: GOLD }}>Home Buyers</span>
                  </span>
                )}
              </div>
              <span
                style={{
                  fontSize: 12,
                  fontWeight: 700,
                  textTransform: "uppercase",
                  letterSpacing: 3,
                  color: "#7a7a7a",
                }}
              >
                Weekly Newsletter
              </span>
            </div>

            {/* Date banner */}
            <div
              style={{
                background: `linear-gradient(135deg, ${GOLD_DARK}, ${GOLD}, ${GOLD_LIGHT})`,
                textAlign: "center",
                padding: "14px 40px",
                fontWeight: 700,
                fontSize: 13,
                textTransform: "uppercase",
                letterSpacing: 4,
                color: BLACK,
              }}
            >
              {dateRange}
            </div>

            {/* Event rows */}
            {rows.map((row, i) => (
              <PreviewRow key={row.id} row={row} index={i} />
            ))}

            {/* Footer */}
            <div
              style={{
                background: BLACK,
                padding: "28px 40px",
                display: "flex",
                justifyContent: "space-between",
                borderTop: `3px solid ${GOLD}`,
              }}
            >
              <span style={{ color: "#ccc", fontSize: 13 }}>📞 {footer.phone}</span>
              <span style={{ color: "#ccc", fontSize: 13 }}>🌐 {footer.website}</span>
              <span style={{ color: "#ccc", fontSize: 13 }}>✉️ {footer.email}</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NewsletterBuilder />);
  </script>
